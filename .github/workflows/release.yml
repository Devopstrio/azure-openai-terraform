name: 'Azure OpenAI Terraform CD'

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'backend/**'
      - 'apps/**'
      - '.github/workflows/release.yml'

jobs:
  validate-and-test:
    name: 'IaC Logic Validation'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v3

    - name: Terraform Fmt & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform fmt -check
        terraform validate

    - name: Run Pytest (API)
      run: |
        pip install pytest fastapi httpx
        pytest tests/

  build-and-push:
    name: 'IaC Platform Release'
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Azure CLI Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build & Push Control API
      run: |
        az acr login --name acrtf
        docker build -t acrtf.azurecr.io/devopstrio/iaas-control-api:${{ github.sha }} ./backend
        docker push acrtf.azurecr.io/devopstrio/iaas-control-api:${{ github.sha }}

    - name: Build & Push TF Engine
      run: |
        docker build -t acrtf.azurecr.io/devopstrio/terraform-engine:${{ github.sha }} ./apps/terraform-engine
        docker push acrtf.azurecr.io/devopstrio/terraform-engine:${{ github.sha }}

  aks-rollout:
    name: 'Deployment to AKS'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: AKS Set Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: 'rg-terraform-mgmt'
        cluster-name: 'aks-ai-infra-prd'

    - name: Helm Upgrade
      run: |
        helm upgrade --install aoai-tf-foundation ./helm/azure-openai-terraform \
        --namespace ai-infra-prod --create-namespace \
        --set api.image.tag=${{ github.sha }}
